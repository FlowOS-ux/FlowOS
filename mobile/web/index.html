<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>FlowOS</title>
    <style>
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: #e2e8f0;
      }
      /* Phone-sized, centered frame with a DEFINITE height so the RN flex:1 chain resolves. */
      #root {
        height: 100vh;
        width: 100%;
        max-width: 420px;
        margin: 0 auto;
        display: flex;
        flex-direction: column;
        background: #f8fafc;
        box-shadow: 0 0 24px rgba(0, 0, 0, 0.12);
        overflow: hidden;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
